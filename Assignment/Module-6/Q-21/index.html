<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Slider by js</title>
</head>

<body>
    <h1><u>Q-21</u>JavaScript Slider</h1>
    <section class="slider-container">
        <div class="slider">
            <div class="slide " style="background-color: #E9D460;">
                <span class="slide-number">1</span>
            </div>
            <div class="slide" style="background-color: #E74C3C;">
                <span class="slide-number">2</span>
            </div>
            <div class="slide" style="background-color: #706FD3;">
                <span class="slide-number">3</span>
            </div>
            <div class="slide" style="background-color: #3FC380;">
                <span class="slide-number">4</span>
            </div>
            <div class="slide" style="background-color: #ff99cc;">
                <span class="slide-number">5</span>
            </div>
        </div>
    </section>
    <!-- ----------------------button----------------- -->
    <div class="but">
        <button class="prev" onclick="prevSlide()"><i class="fa-regular fa-circle-left"></i></button>
        <button class="next" onclick="nextSlide()"><i class="fa-regular fa-circle-right"></i></button>
    </div>
    <script>
        let slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideCount = slides.length;
        // ----------------------------next-previous button----------------
        function nextSlide() {
            showSlide(currentSlide + 1);
        }
        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // ---------------------------zoom- focused slide----------------------
        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (n + slideCount) % slideCount;
            slides[currentSlide].classList.add('active');

            // --------------------------------rotation slider------------
            const offset = -((currentSlide - 2) * (33));
            document.querySelector('.slider').style.transform = `translateX(${offset}%)`;

            // --------------------------bluer other slide------------------
            for (let i = 0; i < slides.length; i++) {
                if (i !== currentSlide) {
                    slides[i].style.filter = 'blur(2px)';
                } else {
                    slides[i].style.filter = 'none';
                }
            }
        }

        // ---------------------------rotation slide---------------------
        setInterval(nextSlide, 4000);
    </script>
</body>

</html>
