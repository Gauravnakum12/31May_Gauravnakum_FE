<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <title>Slider</title>
    <style>
        #slider {
            position: relative;
            width: 75%;
            height: 500px;
            border: 1px solid;
            border-radius: 10px;
            margin: 60px auto;
        }

        #slider img {
            border-radius: 10px;
            height: 100%;
            width: 100%;
        }

        .option {
            width: 98%;
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 45%;
            left: 1%;
        }

        button {
            padding: 15px 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        #slider:hover .fa-solid {
            animation: arrow infinite  1s ;
        }

        @keyframes arrow {
            0% {
                transform: translateX(-5px);
            }
            50% {
                transform: translateX(0px);
            }
            100% {
                transform: translateX(-5px);
            }
        }
    </style>
</head>

<body>
    <section id="slider">
        <img src="">
        <div class="option">
            <button><i class="fa-solid fa-arrow-left-long"></i> Previous</button>
            <button>Next &nbsp;<i class="fa-solid fa-arrow-right-long"></i></button>
        </div>
    </section>
    <script>

    </script>
</body>
</html>
